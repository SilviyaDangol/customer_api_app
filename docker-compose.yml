
services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}"
    volumes:

      - ./app/sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: always

  api:
    build: .
    container_name: fastapi_app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    restart: always
