
services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    env_file:
      - .env
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - ./app/sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: always

  api:
    build: .
    container_name: fastapi_app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    volumes:
      - .:/app
    restart: always
